name: Update Chip Library from KiCad

on:
  schedule:
    - cron: '0 0 1 * *'  # First of every month
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update-chips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone KiCad symbol libraries
        run: git clone --depth 1 https://gitlab.com/kicad/libraries/kicad-symbols.git /tmp/kicad-symbols

      - name: Parse KiCad symbols into chip library
        run: node scripts/import-kicad.js /tmp/kicad-symbols public/chips

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/chips/
          git diff --staged --quiet || git commit -m "chore: update chip library from KiCad symbols"
          git push
